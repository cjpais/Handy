name: "macOS Build"

on:
  workflow_dispatch:
    inputs:
      arch:
        description: "macOS architecture to build"
        required: true
        default: "both"
        type: choice
        options:
          - both
          - apple-silicon
          - intel
      bundle:
        description: "Bundle type"
        required: true
        default: "app"
        type: choice
        options:
          - app
          - app-and-dmg

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ inputs.arch }}
  cancel-in-progress: true

jobs:
  apple-silicon:
    name: Build Apple Silicon
    if: ${{ inputs.arch == 'both' || inputs.arch == 'apple-silicon' }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Ensure VAD model
        run: |
          mkdir -p src-tauri/resources/models
          curl -L -o src-tauri/resources/models/silero_vad_v4.onnx https://blob.handy.computer/silero_vad_v4.onnx

      - name: Compute artifact metadata
        shell: bash
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          VERSION="$(sed -n 's/^version = "\(.*\)"/\1/p' src-tauri/Cargo.toml | head -n 1)"
          ARTIFACT_NAME="handy-macos-v${VERSION}-${{ inputs.bundle }}-aarch64-run${GITHUB_RUN_NUMBER}-${SHORT_SHA}"
          echo "SHORT_SHA=${SHORT_SHA}" >> "$GITHUB_ENV"
          echo "HANDY_VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "ARTIFACT_NAME=${ARTIFACT_NAME}" >> "$GITHUB_ENV"

      - name: Build macOS app
        run: |
          if [ "${{ inputs.bundle }}" = "app-and-dmg" ]; then
            bun run tauri build --target aarch64-apple-darwin --bundles app,dmg --config '{"bundle":{"createUpdaterArtifacts":false}}'
          else
            bun run tauri build --target aarch64-apple-darwin --bundles app --config '{"bundle":{"createUpdaterArtifacts":false}}'
          fi

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: |
            src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app
            src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: warn

      - name: Write workflow summary
        shell: bash
        run: |
          {
            echo "## Apple Silicon artifact"
            echo ""
            echo "- Name: \`${ARTIFACT_NAME}\`"
            echo "- Version: \`${HANDY_VERSION}\`"
            echo "- Bundle: \`${{ inputs.bundle }}\`"
            echo "- Target: \`aarch64-apple-darwin\`"
            echo "- Run: \`${GITHUB_RUN_NUMBER}\`"
            echo "- Commit: \`${SHORT_SHA}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  intel:
    name: Build Intel
    if: ${{ inputs.arch == 'both' || inputs.arch == 'intel' }}
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Ensure VAD model
        run: |
          mkdir -p src-tauri/resources/models
          curl -L -o src-tauri/resources/models/silero_vad_v4.onnx https://blob.handy.computer/silero_vad_v4.onnx

      - name: Compute artifact metadata
        shell: bash
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          VERSION="$(sed -n 's/^version = "\(.*\)"/\1/p' src-tauri/Cargo.toml | head -n 1)"
          ARTIFACT_NAME="handy-macos-v${VERSION}-${{ inputs.bundle }}-x64-run${GITHUB_RUN_NUMBER}-${SHORT_SHA}"
          echo "SHORT_SHA=${SHORT_SHA}" >> "$GITHUB_ENV"
          echo "HANDY_VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "ARTIFACT_NAME=${ARTIFACT_NAME}" >> "$GITHUB_ENV"

      - name: Build macOS app
        run: |
          if [ "${{ inputs.bundle }}" = "app-and-dmg" ]; then
            bun run tauri build --target x86_64-apple-darwin --bundles app,dmg --config '{"bundle":{"createUpdaterArtifacts":false}}'
          else
            bun run tauri build --target x86_64-apple-darwin --bundles app --config '{"bundle":{"createUpdaterArtifacts":false}}'
          fi

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: |
            src-tauri/target/x86_64-apple-darwin/release/bundle/macos/*.app
            src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: warn

      - name: Write workflow summary
        shell: bash
        run: |
          {
            echo "## Intel artifact"
            echo ""
            echo "- Name: \`${ARTIFACT_NAME}\`"
            echo "- Version: \`${HANDY_VERSION}\`"
            echo "- Bundle: \`${{ inputs.bundle }}\`"
            echo "- Target: \`x86_64-apple-darwin\`"
            echo "- Run: \`${GITHUB_RUN_NUMBER}\`"
            echo "- Commit: \`${SHORT_SHA}\`"
          } >> "$GITHUB_STEP_SUMMARY"
