name: "macOS Build"

on:
  workflow_dispatch:
    inputs:
      arch:
        description: "macOS architecture to build"
        required: true
        default: "both"
        type: choice
        options:
          - both
          - apple-silicon
          - intel
      bundle:
        description: "Bundle type"
        required: true
        default: "app"
        type: choice
        options:
          - app
          - app-and-dmg

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ inputs.arch }}
  cancel-in-progress: true

jobs:
  apple-silicon:
    name: Build Apple Silicon
    if: ${{ inputs.arch == 'both' || inputs.arch == 'apple-silicon' }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Ensure VAD model
        run: |
          mkdir -p src-tauri/resources/models
          curl -L -o src-tauri/resources/models/silero_vad_v4.onnx https://blob.handy.computer/silero_vad_v4.onnx

      - name: Build macOS app
        run: |
          if [ "${{ inputs.bundle }}" = "app-and-dmg" ]; then
            bun run tauri build --target aarch64-apple-darwin --bundles app,dmg
          else
            bun run tauri build --target aarch64-apple-darwin --bundles app
          fi

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-aarch64-apple-darwin
          path: |
            src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app
            src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: warn

  intel:
    name: Build Intel
    if: ${{ inputs.arch == 'both' || inputs.arch == 'intel' }}
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Ensure VAD model
        run: |
          mkdir -p src-tauri/resources/models
          curl -L -o src-tauri/resources/models/silero_vad_v4.onnx https://blob.handy.computer/silero_vad_v4.onnx

      - name: Build macOS app
        run: |
          if [ "${{ inputs.bundle }}" = "app-and-dmg" ]; then
            bun run tauri build --target x86_64-apple-darwin --bundles app,dmg
          else
            bun run tauri build --target x86_64-apple-darwin --bundles app
          fi

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-x86_64-apple-darwin
          path: |
            src-tauri/target/x86_64-apple-darwin/release/bundle/macos/*.app
            src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: warn
