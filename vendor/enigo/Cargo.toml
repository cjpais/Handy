    "dep:wayland-protocols-misc",
    "dep:wayland-protocols-wlr",
    "dep:tempfile",
    "dep:nom",
]
x11rb = [
    "dep:x11rb",
    "dep:nom",
]
xdo = []

[lib]
name = "enigo"
path = "src/lib.rs"

[[test]]
name = "integration_browser"
