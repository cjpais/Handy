[package]
edition = "2024"
rust-version = "1.85"
name = "enigo"
version = "0.6.1"
authors = [
    "pentamassiv <pentamassiv@posteo.de>",
    "Dustin Bensing <dustin.bensing@googlemail.com>",
]
build = false
exclude = [
    ".github",
    "examples",
    ".gitignore",
    "rustfmt.toml",
]
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "Cross-platform (Linux, Windows, macOS & BSD) library to simulate keyboard and mouse events"
homepage = "https://github.com/enigo-rs/enigo"
documentation = "https://docs.rs/enigo/"
readme = "README.md"
keywords = [
    "simulate",
    "input",
    "mouse",
    "keyboard",
    "automation",
]
categories = [
    "development-tools::testing",
    "api-bindings",
    "hardware-support",
    "os",
    "simulation",
]
license = "MIT"
repository = "https://github.com/enigo-rs/enigo"

[package.metadata.docs.rs]
features = [
    "x11rb",
    "wayland",
    "libei_smol",
    "platform_specific",
    "serde",
]
rustdoc-args = [
    "--cfg",
    "docsrs",
]

[features]
default = ["x11rb"]
libei_smol = [
    "dep:reis",
    "dep:ashpd",
    "ashpd/async-std",
    "dep:futures",
    "dep:nom",
]
